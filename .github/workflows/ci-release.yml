name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Race test
        run: go test -race ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Validate release tag
        shell: bash
        run: |
          version="$GITHUB_REF_NAME"
          core='(0|[1-9][0-9]*)'
          prerelease='(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)'
          build='[0-9A-Za-z-]+'
          semver="^v${core}\\.${core}\\.${core}(-${prerelease}(\\.${prerelease})*)?(\\+${build}(\\.${build})*)?$"
          if [[ ! "$version" =~ $semver ]]; then
            echo "Invalid semantic version tag: $version" >&2
            exit 1
          fi
      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="$GITHUB_REF_NAME"
          for target in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w -X main.appVersion=$version" \
              -o "dist/providerdeck-$os-$arch" .
          done
          cp LICENSE THIRD_PARTY_NOTICES.md dist/
          (
            cd dist
            sha256sum providerdeck-* > SHA256SUMS
          )
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
